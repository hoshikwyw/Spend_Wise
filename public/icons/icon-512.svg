<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="coin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="wallet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5F3FF"/>
    </linearGradient>
    <filter id="walletShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#4C1D95" flood-opacity="0.2"/>
    </filter>
    <filter id="coinShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#92400E" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="425" cy="75" r="65" fill="white" opacity="0.07"/>
  <circle cx="75" cy="440" r="50" fill="white" opacity="0.05"/>
  <circle cx="450" cy="400" r="30" fill="white" opacity="0.04"/>

  <!-- Wallet body with shadow -->
  <g filter="url(#walletShadow)">
    <rect x="92" y="178" width="328" height="214" rx="38" fill="url(#wallet)"/>
  </g>

  <!-- Wallet flap -->
  <path d="M92 222 L92 192 C92 162 116 140 150 140 L362 140 C396 140 420 162 420 192 L420 222" fill="white" stroke="#E9E0FF" stroke-width="3"/>

  <!-- Wallet stitching line -->
  <line x1="122" y1="226" x2="280" y2="226" stroke="#DDD6FE" stroke-width="3" stroke-linecap="round" stroke-dasharray="8 6"/>

  <!-- Wallet clasp area -->
  <rect x="322" y="258" width="88" height="68" rx="22" fill="#8B5CF6" opacity="0.12"/>
  <circle cx="366" cy="292" r="15" fill="#8B5CF6" opacity="0.3"/>
  <circle cx="366" cy="292" r="7" fill="#8B5CF6" opacity="0.2"/>

  <!-- Card peeking out of wallet -->
  <rect x="118" y="262" width="148" height="94" rx="14" fill="#F9F7FF" stroke="#E9E0FF" stroke-width="2"/>
  <rect x="136" y="280" width="54" height="9" rx="4.5" fill="#C4B5FD"/>
  <rect x="136" y="297" width="86" height="7" rx="3.5" fill="#DDD6FE"/>
  <rect x="136" y="312" width="64" height="7" rx="3.5" fill="#EDE9FE"/>
  <rect x="136" y="327" width="40" height="7" rx="3.5" fill="#F3F0FF"/>

  <!-- Coin 1 (top right, big) -->
  <g filter="url(#coinShadow)">
    <circle cx="382" cy="105" r="50" fill="url(#coin)" stroke="#D97706" stroke-width="3"/>
    <circle cx="382" cy="105" r="40" fill="none" stroke="#D97706" stroke-width="1.5" opacity="0.3"/>
    <text x="382" y="122" text-anchor="middle" font-size="48" font-weight="bold" font-family="Arial" fill="#92400E">S</text>
  </g>

  <!-- Coin 2 (top left, medium) -->
  <g filter="url(#coinShadow)">
    <circle cx="138" cy="112" r="34" fill="url(#coin)" stroke="#D97706" stroke-width="2"/>
    <circle cx="138" cy="112" r="26" fill="none" stroke="#D97706" stroke-width="1" opacity="0.3"/>
    <text x="138" y="125" text-anchor="middle" font-size="32" font-weight="bold" font-family="Arial" fill="#92400E">S</text>
  </g>

  <!-- Coin 3 (tiny accent) -->
  <circle cx="272" cy="92" r="18" fill="url(#coin)" stroke="#D97706" stroke-width="1.5" opacity="0.7"/>
  <text x="272" y="99" text-anchor="middle" font-size="16" font-weight="bold" font-family="Arial" fill="#92400E" opacity="0.7">$</text>

  <!-- Sparkle stars -->
  <g fill="white" opacity="0.75">
    <path d="M458 195 L462 207 L474 211 L462 215 L458 227 L454 215 L442 211 L454 207 Z"/>
    <path d="M68 278 L71 286 L79 289 L71 292 L68 300 L65 292 L57 289 L65 286 Z" transform="scale(0.85) translate(8, 36)"/>
    <path d="M205 75 L207 81 L213 83 L207 85 L205 91 L203 85 L197 83 L203 81 Z"/>
  </g>

  <!-- Hearts -->
  <g transform="translate(460, 315) scale(0.55)" fill="white" opacity="0.45">
    <path d="M0 -10 C-10 -25 -35 -25 -35 -5 C-35 10 -15 25 0 40 C15 25 35 10 35 -5 C35 -25 10 -25 0 -10 Z"/>
  </g>
  <g transform="translate(50, 190) scale(0.3)" fill="white" opacity="0.3">
    <path d="M0 -10 C-10 -25 -35 -25 -35 -5 C-35 10 -15 25 0 40 C15 25 35 10 35 -5 C35 -25 10 -25 0 -10 Z"/>
  </g>

  <!-- Bottom text -->
  <text x="256" y="452" text-anchor="middle" font-size="36" font-weight="800" font-family="Arial, sans-serif" fill="white" opacity="0.95" letter-spacing="5">SPENDWISE</text>
  <text x="256" y="476" text-anchor="middle" font-size="13" font-weight="600" font-family="Arial, sans-serif" fill="white" opacity="0.45" letter-spacing="4">CUTE TRACKER</text>
</svg>
